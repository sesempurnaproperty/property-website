<!DOCTYPE html>
<html>
<head>
<title>Sesempurna Property</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0d6efd;
color:white;
padding:25px;
text-align:center;
}

.container{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:300px;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.price{
color:green;
font-weight:bold;
font-size:20px;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>🏠 Sesempurna Property</h1>
<p>Cari rumah impian anda</p>
</header>

<div class="container">

<div class="card">
<h3>Rumah Teres</h3>
<p>Lokasi: Shah Alam</p>
<p class="price">RM550,000</p>
<button>Hubungi Agent</button>
</div>

<div class="card">
<h3>Kondominium</h3>
<p>Lokasi: Subang</p>
<p class="price">RM420,000</p>
<button>Hubungi Agent</button>
</div>

</div>

</body>
</html>
